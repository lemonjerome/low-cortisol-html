services:
  low-cortisol-html:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: low-cortisol-html-agent
    working_dir: /app
    volumes:
      - ..:/app
      - ../lch_workspaces:/app/lch_workspaces
    env_file:
      - ../.env
    environment:
      OLLAMA_BASE_URL: https://ollama.com
      ORCHESTRATOR_MODEL: qwen3-coder-next
      ORCHESTRATOR_AGENT_NUM_CTX: "40000"
      EMBEDDING_MODEL: nomic-embed-text
      WORKSPACE_ROOT: ""
      UI_HOST: 0.0.0.0
      UI_PORT: 8000
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    stdin_open: true
    tty: true